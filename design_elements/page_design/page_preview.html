<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Preston Rank — Preview</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="page_preview.css">
</head>
<body>

<!-- ─────────────────────────────────────────────
     GRAIN PASS A (z:60) — fine cool noise
     ───────────────────────────────────────────── -->
<svg class="grain grain-a" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <filter id="grainA" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="3" stitchTiles="stitch" seed="3"/>
    <feColorMatrix values="0 0 0 0 0.80
                           0 0 0 0 0.88
                           0 0 0 0 0.98
                           0 0 0 0.10 0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grainA)"/>
</svg>

<!-- ─────────────────────────────────────────────
     STAGE
     ───────────────────────────────────────────── -->
<div class="stage">

  <!-- LEFT PANEL -->
  <section class="panel panel-left">
    <h1 class="name">
      <span class="first">Preston</span>
      <span class="last">Rank</span>
    </h1>

    <!-- Void bubbles · positioned in negative space, never overlapping the orb -->
    <div class="bubble b-8"  style="width:46px; height:46px; top: 22%; left: 8%;">
      <div class="swirl"></div>
      <div class="mesh">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <filter id="meshA">
            <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="2" seed="2">
              <animate attributeName="seed" from="2" to="80" dur="16s" repeatCount="indefinite"/>
              <animate attributeName="baseFrequency" values="0.88;0.96;0.88" dur="9s" repeatCount="indefinite"/>
            </feTurbulence>
            <feColorMatrix values="0 0 0 0 0.78
                                   0 0 0 0 0.80
                                   0 0 0 0 0.84
                                   0 0 0 0.58 0"/>
          </filter>
          <rect width="100%" height="100%" filter="url(#meshA)"/>
        </svg>
      </div>
      <div class="digit" style="font-size: 19px;">8</div>
    </div>

    <div class="bubble b-13 delay-1" style="width:52px; height:52px; top: 68%; left: 14%;">
      <div class="swirl"></div>
      <div class="mesh">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <filter id="meshB">
            <feTurbulence type="fractalNoise" baseFrequency="0.90" numOctaves="2" seed="11">
              <animate attributeName="seed" from="11" to="120" dur="19s" repeatCount="indefinite"/>
              <animate attributeName="baseFrequency" values="0.86;0.98;0.86" dur="11s" repeatCount="indefinite"/>
            </feTurbulence>
            <feColorMatrix values="0 0 0 0 0.78
                                   0 0 0 0 0.80
                                   0 0 0 0 0.84
                                   0 0 0 0.58 0"/>
          </filter>
          <rect width="100%" height="100%" filter="url(#meshB)"/>
        </svg>
      </div>
      <div class="digit" style="font-size: 22px;">13</div>
    </div>

    <div class="bubble b-14 delay-2" style="width:40px; height:40px; top: 80%; left: 38%;">
      <div class="swirl"></div>
      <div class="mesh">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <filter id="meshC">
            <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7">
              <animate attributeName="seed" from="7" to="95" dur="14s" repeatCount="indefinite"/>
              <animate attributeName="baseFrequency" values="0.92;1.02;0.92" dur="10s" repeatCount="indefinite"/>
            </feTurbulence>
            <feColorMatrix values="0 0 0 0 0.78
                                   0 0 0 0 0.80
                                   0 0 0 0 0.84
                                   0 0 0 0.58 0"/>
          </filter>
          <rect width="100%" height="100%" filter="url(#meshC)"/>
        </svg>
      </div>
      <div class="digit" style="font-size: 17px;">14</div>
    </div>

    <!-- ORB -->
    <div class="orb-wrap">
      <svg viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <path id="textCircle" d="M 280,280 m -250,0 a 250,250 0 1,1 500,0 a 250,250 0 1,1 -500,0"/>
        </defs>

        <!-- Static rings -->
        <g fill="none" stroke="#E8DCC0">
          <circle cx="280" cy="280" r="210" stroke-opacity="0.10"/>
          <circle cx="280" cy="280" r="175" stroke-opacity="0.07" stroke-dasharray="2 6"/>
          <circle cx="280" cy="280" r="140" stroke-opacity="0.09"/>
          <circle cx="280" cy="280" r="105" stroke-opacity="0.06" stroke-dasharray="2 6"/>
          <circle cx="280" cy="280" r="68"  stroke-opacity="0.08"/>
        </g>

        <!-- Rotating outer ring + text path -->
        <g class="ring-rotate">
          <circle cx="280" cy="280" r="250" fill="none" stroke="#E8DCC0" stroke-opacity="0.18"/>
          <text font-family="Fira Code, monospace" font-size="8.5" fill="#E8DCC0" fill-opacity="0.22" letter-spacing="0.34em">
            <textPath href="#textCircle" startOffset="0">
              SOLUTIONS ENGINEER · SOFTWARE ENGINEER · SOLUTIONS ENGINEER · SOFTWARE ENGINEER ·
            </textPath>
          </text>
        </g>

        <!-- Arc highlights (ambient) -->
        <g fill="none" stroke="#E8DCC0" stroke-width="2.4" stroke-linecap="round">
          <path class="arc-hi" data-arc="experience" d="M 368.7,89.7  A 210,210 0 0,1 452.0,159.6"/>
          <path class="arc-hi" data-arc="projects"   d="M 482.8,225.7 A 210,210 0 0,1 482.8,334.3"/>
          <path class="arc-hi" data-arc="about"      d="M 452.0,400.4 A 210,210 0 0,1 368.7,470.3"/>
        </g>

        <!-- Center text -->
        <text x="280" y="276" text-anchor="middle" font-family="Fira Code, monospace" font-size="7.5"
              fill="#E8DCC0" fill-opacity="0.32" letter-spacing="0.34em">P · RANK</text>
        <text x="280" y="290" text-anchor="middle" font-family="Fira Code, monospace" font-size="7.5"
              fill="#E8DCC0" fill-opacity="0.18" letter-spacing="0.34em">2026</text>

        <!-- Node: Experience (50° above) -->
        <g class="node-group" data-node="experience">
          <line class="node-line" x1="414.9" y1="119.1" x2="548" y2="119.1"
                stroke="#E8DCC0" stroke-width="1"/>
          <circle class="node-ring" cx="414.9" cy="119.1" r="11" fill="none"
                  stroke="#E8DCC0" stroke-width="1" opacity="0"/>
          <circle class="node-dot"  cx="414.9" cy="119.1" r="3.5" fill="#E8DCC0" opacity="0.5"/>
          <text class="node-label" x="430" y="113" font-family="Fira Code, monospace"
                font-size="8.5" fill="#8FA0AC" opacity="0.7" letter-spacing="0.14em">EXPERIENCE</text>
          <circle cx="414.9" cy="119.1" r="30" fill="transparent" class="node-hit"/>
        </g>

        <!-- Node: Projects (0°) -->
        <g class="node-group" data-node="projects">
          <line class="node-line" x1="490" y1="280" x2="548" y2="280"
                stroke="#E8DCC0" stroke-width="1"/>
          <circle class="node-ring" cx="490" cy="280" r="11" fill="none"
                  stroke="#E8DCC0" stroke-width="1" opacity="0"/>
          <circle class="node-dot"  cx="490" cy="280" r="3.5" fill="#E8DCC0" opacity="0.5"/>
          <text class="node-label" x="505" y="284" font-family="Fira Code, monospace"
                font-size="8.5" fill="#8FA0AC" opacity="0.7" letter-spacing="0.14em">PROJECTS</text>
          <circle cx="490" cy="280" r="30" fill="transparent" class="node-hit"/>
        </g>

        <!-- Node: About (-50°) -->
        <g class="node-group" data-node="about">
          <line class="node-line" x1="414.9" y1="440.9" x2="548" y2="440.9"
                stroke="#E8DCC0" stroke-width="1"/>
          <circle class="node-ring" cx="414.9" cy="440.9" r="11" fill="none"
                  stroke="#E8DCC0" stroke-width="1" opacity="0"/>
          <circle class="node-dot"  cx="414.9" cy="440.9" r="3.5" fill="#E8DCC0" opacity="0.5"/>
          <text class="node-label" x="430" y="445" font-family="Fira Code, monospace"
                font-size="8.5" fill="#8FA0AC" opacity="0.7" letter-spacing="0.14em">ABOUT</text>
          <circle cx="414.9" cy="440.9" r="30" fill="transparent" class="node-hit"/>
        </g>
      </svg>
    </div>
  </section>

  <!-- DIVIDER GLOW -->
  <div class="divider"></div>

  <!-- RIGHT PANEL · default state -->
  <section class="panel panel-right">
    <div class="pane-default">
      <div class="eyebrow">Est. — United States</div>
      <p class="headline">
        Building systems at the intersection of <em>product and engineering</em>.
      </p>
      <div class="hint">approach the circle to explore</div>
      <div class="socials">
        <a href="#">LinkedIn ↗</a>
        <a href="#">GitHub ↗</a>
        <a href="#">Email</a>
      </div>
    </div>
  </section>
</div>

<!-- BOTTOM STRIP -->
<footer class="footer">
  <span>Solutions Engineer · Software Engineer</span>
  <span>© 2026 P. RANK</span>
</footer>

<!-- GRAIN PASS B (z:2) — coarser warm-tinted -->
<svg class="grain grain-b" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <filter id="grainB" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="1.05" numOctaves="2" stitchTiles="stitch" seed="9"/>
    <feColorMatrix values="0 0 0 0 0.72
                           0 0 0 0 0.82
                           0 0 0 0 0.95
                           0 0 0 0.08 0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grainB)"/>
</svg>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<script>
  const cur = document.getElementById('cursor');
  window.addEventListener('mousemove', (e) => {
    cur.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
  });

  const groups = document.querySelectorAll('.node-group');
  const arcs   = document.querySelectorAll('.arc-hi');

  groups.forEach((g) => {
    const hit  = g.querySelector('.node-hit');
    const name = g.dataset.node;
    hit.addEventListener('mouseenter', () => {
      g.classList.add('is-active');
      arcs.forEach((a) => {
        a.style.opacity = a.dataset.arc === name ? 0.9 : 0.5;
      });
      cur.classList.add('is-large');
    });
    hit.addEventListener('mouseleave', () => {
      g.classList.remove('is-active');
      arcs.forEach((a) => { a.style.opacity = ''; });
      cur.classList.remove('is-large');
    });
  });
</script>
</body>
</html>
