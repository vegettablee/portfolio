  .uncompressed { color: #c8d8a8; }
  .compressed { color: #88b8d8; }

  .output-c {
    color: #d4c8a8;

  .output-c.mismatch { color: #e8a060; }
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
    background: #2a2a2a;
    color: #888;
  }
  .badge.match { background: #1a3a1a; color: #6a9a6a; }
  .badge.diff  { background: #3a2a1a; color: #c07040; }
</style>
</head>
